<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Design.today - Midterm Project</title>

    <meta
      name="description"
      content="Discover the best UI/UX design components, mobile applications, and top designers around the world on Design.today."
    />
    <meta
      name="keywords"
      content="design, ui, ux, web design, app design, top designers, inspiration"
    />
    <meta name="robots" content="index, follow" />

    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://design.today/" />
    <!-- დიზაინ თუდეიში მერე უნდა დავამატო ფოტოს ლინკი არ დამავიწყდეს -->
    <meta property="og:title" content="Design.today - Midterm Project" />
    <meta
      property="og:description"
      content="Discover the best UI/UX design components, mobile applications, and top designers around the world."
    />
    <meta
      property="og:image"
      content="https://design.today/assets/preview.jpg"
    />
    <meta property="og:site_name" content="Design.today" />

    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="page-container">
      <aside class="sidebar">
        <div class="logo-wrapper">
          <h2 class="logo">design.today</h2>
          <img src="images/menu-icon.png" alt="menu" class="menu-icon" />
        </div>
        <nav class="main-nav">
          <ul>
            <li>
              <a href="#" class="active">
                <img src="images/home.png" alt="home" />
                <span>Home</span>
              </a>
            </li>
            <li>
              <a href="#">
                <img src="images/explore.png" alt="explore" />
                <span>Explore</span>
              </a>
            </li>
            <li>
              <a href="#">
                <img src="images/folders.png" alt="folders" />
                <span>Folders</span>
              </a>
            </li>
            <li>
              <a href="#">
                <img src="images/favourites.png" alt="favourites" />
                <span>Favourites</span>
              </a>
            </li>
            <li>
              <a href="#">
                <img src="images/activities.png" alt="activities" />
                <span>Activities</span>
              </a>
            </li>
          </ul>
        </nav>
        <div class="following-section">
          <h3 class="section-title">FOLLOWING</h3>
          <ul>
            <li>
              <a href="#">
                <img src="images/sajon.png" alt="Sajon" />
                <span>Sajon</span>
              </a>
            </li>
            <li>
              <a href="#">
                <img src="images/tran.png" alt="tran" />
                <span>Tran Mau Tri Tam</span>
              </a>
            </li>
            <li>
              <a href="#">
                <img src="images/ghani.png" alt="Ghani" />
                <span>Ghani Pradita</span>
              </a>
            </li>
            <li>
              <a href="#">
                <img src="images/david.png" alt="David" />
                <span>David Kovalev</span>
              </a>
            </li>
            <li>
              <a href="#">
                <img src="images/ryan.png" alt="Ryan" />
                <span>Ryan Putnam</span>
              </a>
            </li>
          </ul>
          <a href="#" class="load-more">Load more (15)</a>
        </div>
      </aside>

      <div class="content-wrapper">
        <header class="top-header">
          <div class="search-box">
            <input type="text" placeholder="Search inspiration" />
            <img
              src="images/searchicon.png"
              alt="searchicon"
              class="search-icon-img"
            />
          </div>

          <div class="header-actions">
            <a href="#" class="go-pro-link">GO PRO!</a>

            <!-- გო პროს რომ ვაჭერ მეორე გვერდზე უნდა გადადიოდეს არ დამავიწყდეს!! -->

            <div class="header-icons">
              <a href="#" class="icon-link notification-wrapper">
                <img src="images/mail.png" alt="mail" />
                <span class="badge"></span>
              </a>

              <a href="#" class="icon-link notification-wrapper">
                <img src="images/ring.png" alt="ring" />
                <span class="badge"></span>
              </a>
            </div>

            <img
              src="images/avatar.png"
              alt="User Profile"
              class="user-avatar"
            />
            <label for="file-upload" class="upload-btn">UPLOAD</label>
            <input
              type="file"
              id="file-upload"
              accept="image/*"
              style="display: none"
            />
          </div>
        </header>
        <main class="main-content">
          <h2>Main Content (Grid & Designers)</h2>
        </main>

        <footer class="main-footer">
          <h2>Footer</h2>
        </footer>
      </div>
    </div>
  </body>
</html>
